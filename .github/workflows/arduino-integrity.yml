name: Arduino Code Quality

on:
  push:
    paths:
      - '**.ino'
      - '**.h'
      - '**.cpp'
  pull_request:
    paths:
      - '**.ino'

jobs:
  compile-sketch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP8266 Platform
        run: |
          arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Compile for D1 Mini
        # Using the Fully Qualified Board Name (FQBN) for the Lolin D1 Mini
        run: |
          arduino-cli compile --fqbn esp8266:esp8266:d1_mini ./offline-wifi-feed.ino